<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéBattle - Result</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body data-page="battle-result">
<div class="page" id="battle-result">
  <nav>
    <div class="nav-logo"><div class="nav-logo-icon">⚔️</div><span class="nav-logo-text">PokéBattle</span></div>
    <div class="nav-links">
      <button class="nav-link" onclick="goTo('home')"><i class="ti ti-home" aria-hidden="true"></i> Home</button>
      <button class="nav-link" onclick="goTo('collection')"><i class="ti ti-book" aria-hidden="true"></i> Collection</button>
      <button class="nav-link active"><i class="ti ti-sword" aria-hidden="true"></i> Battle</button>
      <button class="nav-link" onclick="goTo('inventory')"><i class="ti ti-package" aria-hidden="true"></i> Inventory</button>
    </div>
    <div class="nav-right">
      <div class="badge-trainer">⭐ Admin12345</div>
      <button class="btn-logout" onclick="goTo('login')"><i class="ti ti-logout" aria-hidden="true"></i> Logout</button>
    </div>
  </nav>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px">
    <div class="result-overlay" id="result-overlay">
      <!-- Loading state -->
      <div id="result-loading" style="text-align:center;padding:32px 0">
        <div style="font-size:32px;margin-bottom:12px">⏳</div>
        <div style="font-size:11px;color:var(--text3)">Memuat hasil battle...</div>
      </div>

      <!-- Result content (hidden until loaded) -->
      <div id="result-content" style="display:none;width:100%">
        <div id="result-icon" style="font-size:56px;margin-bottom:12px">🏆</div>
        <div class="result-title win" id="result-title">VICTORY!</div>
        <div class="result-badge win" id="result-badge">⭐ Kamu berhasil mengalahkan lawan!</div>

        <div class="result-vs">
          <div class="result-pokemon">
            <div class="result-sprite" id="res-player-sprite">🔥</div>
            <div class="result-pokemon-name" id="res-player-name">-</div>
          </div>
          <div class="vs-text">VS</div>
          <div class="result-pokemon">
            <div class="result-sprite" id="res-enemy-sprite">❓</div>
            <div class="result-pokemon-name" id="res-enemy-name">-</div>
          </div>
        </div>

        <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Ringkasan Battle</div>
        <div class="result-stats">
          <div class="result-stat">
            <div class="result-stat-val" id="res-turns">-</div>
            <div class="result-stat-lbl">Giliran</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-val" style="color:var(--green)" id="res-menang">-</div>
            <div class="result-stat-lbl">Total Menang</div>
          </div>
          <div class="result-stat">
            <div class="result-stat-val" style="color:var(--yellow)" id="res-winrate">-%</div>
            <div class="result-stat-lbl">Win Rate</div>
          </div>
        </div>

        <div style="font-size:11px;color:var(--text3);margin-bottom:16px" id="result-tip"></div>

        <div class="result-btns">
          <button class="btn btn-red btn-lg" onclick="goTo('battle-home')">⚔️ Battle Lagi</button>
          <button class="btn btn-outline btn-lg" onclick="goTo('home')">🏠 Home</button>
        </div>
      </div>

      <!-- Error state -->
      <div id="result-error" style="display:none;text-align:center;padding:16px 0">
        <div style="font-size:32px;margin-bottom:8px">⚠️</div>
        <div style="font-size:11px;color:var(--text3);margin-bottom:16px">Gagal memuat data battle.</div>
        <div class="result-btns">
          <button class="btn btn-red btn-lg" onclick="goTo('battle-home')">⚔️ Battle Lagi</button>
          <button class="btn btn-outline btn-lg" onclick="goTo('home')">🏠 Home</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/main.js"></script>
<script>
// Baca semua data dari localStorage — tidak hit API yang sudah stale setelah /battle/end
function renderBattleResult() {
  const loading  = document.getElementById('result-loading');
  const content  = document.getElementById('result-content');
  const errorDiv = document.getElementById('result-error');

  try {
    // --- Hasil battle ---
    const isVictory = localStorage.getItem('lastBattleWin') === 'true';
    const turnCount = parseInt(localStorage.getItem('lastBattleTurns') || '0', 10);

    // --- Pokemon data (disimpan battle-ingame sebelum redirect) ---
    let playerSprite = '🔥', playerPokeName = 'Unknown';
    let enemySprite  = '❓', enemyName      = 'Unknown';

    const rawPlayer = localStorage.getItem('lastPlayerPokemon');
    const rawEnemy  = localStorage.getItem('lastEnemyPokemon');

    if (rawPlayer) {
      try {
        const p = JSON.parse(rawPlayer);
        playerSprite   = getPokemonSprite(p.type);
        playerPokeName = p.name || 'Unknown';
      } catch (_) {}
    }

    if (rawEnemy) {
      try {
        const e = JSON.parse(rawEnemy);
        enemySprite = getPokemonSprite(e.type);
        enemyName   = e.name || 'Unknown';
      } catch (_) {}
    }

    // --- Stats ---
    const totalBattles = parseInt(localStorage.getItem('totalBattles') || '1', 10);
    const totalWins    = parseInt(localStorage.getItem('totalWins')    || (isVictory ? '1' : '0'), 10);
    const winRate      = totalBattles > 0
      ? Math.round((totalWins / totalBattles) * 100) + '%'
      : '0%';

    // --- Update DOM ---
    document.getElementById('result-icon').textContent = isVictory ? '🏆' : '💀';

    const titleEl = document.getElementById('result-title');
    titleEl.textContent = isVictory ? 'VICTORY!' : 'DEFEATED...';
    titleEl.className   = `result-title ${isVictory ? 'win' : 'lose'}`;

    const badgeEl = document.getElementById('result-badge');
    badgeEl.textContent = isVictory
      ? '⭐ Kamu berhasil mengalahkan lawan!'
      : '💔 Kamu berhasil dikalahkan lawan...';
    badgeEl.className = `result-badge ${isVictory ? 'win' : 'lose'}`;

    document.getElementById('res-player-sprite').textContent = playerSprite;
    document.getElementById('res-player-name').textContent   = playerPokeName;
    document.getElementById('res-enemy-sprite').textContent  = enemySprite;
    document.getElementById('res-enemy-name').textContent    = enemyName;

    document.getElementById('res-turns').textContent   = turnCount > 0 ? turnCount : '-';
    document.getElementById('res-menang').textContent  = totalWins;
    document.getElementById('res-winrate').textContent = winRate;

    document.getElementById('result-tip').textContent = isVictory
      ? '✨ Pokémon kamu semakin kuat! Terus berlatih untuk menjadi Pokémon Master!'
      : '😔 Gunakan item di inventory untuk memulihkan Pokémon dan coba lagi!';

    loading.style.display = 'none';
    content.style.display = 'block';

  } catch (err) {
    console.error('Failed to render battle result:', err);
    loading.style.display = 'none';
    errorDiv.style.display = 'block';
  }
}
</script>
</body>
</html>
