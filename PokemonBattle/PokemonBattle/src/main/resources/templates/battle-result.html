<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéBattle - Result</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body data-page="battle-result">
<div class="page" id="battle-result">
  <nav>
    <div class="nav-logo"><div class="nav-logo-icon">⚔️</div><span class="nav-logo-text">PokéBattle</span></div>
    <div class="nav-links">
      <button class="nav-link" onclick="goTo('home')"><i class="ti ti-home" aria-hidden="true"></i> Home</button>
      <button class="nav-link" onclick="goTo('collection')"><i class="ti ti-book" aria-hidden="true"></i> Collection</button>
      <button class="nav-link active"><i class="ti ti-sword" aria-hidden="true"></i> Battle</button>
      <button class="nav-link" onclick="goTo('inventory')"><i class="ti ti-package" aria-hidden="true"></i> Inventory</button>
    </div>
    <div class="nav-right">
      <div class="badge-trainer">⭐ Admin12345</div>
      <button class="btn-logout" onclick="goTo('login')"><i class="ti ti-logout" aria-hidden="true"></i> Logout</button>
    </div>
  </nav>
  <div style="flex:1;display:flex;align-items:center;justify-content:center;padding:24px">
    <div class="result-overlay">
      <div id="result-icon" style="font-size:56px;margin-bottom:12px">🏆</div>
      <div class="result-title win" id="result-title">VICTORY!</div>
      <div class="result-badge win" id="result-badge">⭐ Kamu berhasil mengalahkan lawan!</div>
      <div class="result-vs">
        <div class="result-pokemon"><div class="result-sprite">🔥</div><div class="result-pokemon-name">Charizard</div></div>
        <div class="vs-text">VS</div>
        <div class="result-pokemon"><div class="result-sprite">🦕</div><div class="result-pokemon-name">Agumon</div></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:12px">Ringkasan Battle</div>
      <div class="result-stats">
        <div class="result-stat"><div class="result-stat-val">1</div><div class="result-stat-lbl">Giliran</div></div>
        <div class="result-stat"><div class="result-stat-val" style="color:var(--green)" id="res-menang">1</div><div class="result-stat-lbl">Total Menang</div></div>
        <div class="result-stat"><div class="result-stat-val" style="color:var(--yellow)" id="res-winrate">100%</div><div class="result-stat-lbl">Win Rate</div></div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:16px" id="result-tip">✨ Pokémon kamu semakin kuat! Terus berlatih untuk menjadi Pokémon Master!</div>
      <div class="result-btns">
        <button class="btn btn-red btn-lg" onclick="goTo('battle-home')">⚔️ Battle Lagi</button>
        <button class="btn btn-outline btn-lg" onclick="goTo('home')">🏠 Home</button>
      </div>
      <div style="margin-top:16px">
        <button class="btn btn-outline btn-sm" style="margin:0 auto" onclick="toggleResult()">🔄 Lihat versi Defeat</button>
      </div>
    </div>
  </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
