<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PokéBattle - Collection</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
</head>
<body data-page="collection">
<div class="page" id="collection">
  <nav>
    <div class="nav-logo"><div class="nav-logo-icon">⚔️</div><span class="nav-logo-text">PokéBattle</span></div>
    <div class="nav-links">
      <button class="nav-link" onclick="goTo('home')"><i class="ti ti-home" aria-hidden="true"></i> Home</button>
      <button class="nav-link active" onclick="goTo('collection')"><i class="ti ti-book" aria-hidden="true"></i> Collection</button>
      <button class="nav-link" onclick="goTo('battle-home')"><i class="ti ti-sword" aria-hidden="true"></i> Battle</button>
      <button class="nav-link" onclick="goTo('inventory')"><i class="ti ti-package" aria-hidden="true"></i> Inventory</button>
    </div>
    <div class="nav-right">
      <div class="badge-trainer">⭐ Admin12345</div>
      <button class="btn-logout" onclick="goTo('login')"><i class="ti ti-logout" aria-hidden="true"></i> Logout</button>
    </div>
  </nav>
  <div class="page-content">
    <div class="page-header">
      <div class="page-title">Collection</div>
      <div class="page-sub">Pokémon koleksimu — klik untuk melihat detail</div>
    </div>
    <div class="collection-layout">
      <div class="pokemon-grid" id="pokemon-list">
        <!-- Injected by JS -->
      </div>
      <div class="detail-panel" id="detail-panel">
        <div style="text-align:center;color:var(--text3);font-size:12px;padding:40px 0">
          <div style="font-size:32px;margin-bottom:8px">👆</div>
          Pilih Pokémon untuk melihat detail
        </div>
      </div>
    </div>
  </div>
</div>
<script src="/js/main.js"></script>
</body>
</html>
